name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  check-title:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            // 학번(8자리)_이름(한글) 형식 체크
            const pattern = /^\d{8}_.+$/;

            if (!pattern.test(title)) {
              core.setFailed(
                `❌ PR 제목이 올바른 형식이 아닙니다.\n\n` +
                `현재 제목: "${title}"\n` +
                `올바른 형식: "학번_이름" (예: 20261234_홍길동)\n\n` +
                `PR 제목을 수정해주세요.`
              );
            } else {
              console.log(`✅ PR 제목 형식 확인 완료: "${title}"`);
            }
