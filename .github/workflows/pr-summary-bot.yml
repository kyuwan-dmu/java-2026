name: PR Summary Bot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const base = pr.base.sha;
            const head = pr.head.sha;

            // 커밋 목록 가져오기
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // 변경 파일 목록 가져오기
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // 커밋 요약
            const commitList = commits.map(c => {
              const msg = c.commit.message.split('\n')[0];
              const sha = c.sha.substring(0, 7);
              return `| \`${sha}\` | ${msg} |`;
            }).join('\n');

            // 변경 파일 요약
            const fileList = files.map(f => {
              const status = { added: '🟢 Added', modified: '🟡 Modified', removed: '🔴 Removed' };
              return `| \`${f.filename}\` | ${status[f.status] || f.status} | +${f.additions} -${f.deletions} |`;
            }).join('\n');

            const body = `## 📊 PR Summary (auto-generated)

            ### Commits (${commits.length})
            | SHA | Message |
            |-----|---------|
            ${commitList}

            ### Changed Files (${files.length})
            | File | Status | Changes |
            |------|--------|---------|
            ${fileList}

            ---
            > 🤖 This summary was auto-generated by PR Summary Bot.`.replace(/^            /gm, '');

            // 기존 봇 코멘트 찾기
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Summary (auto-generated)')
            );

            if (botComment) {
              // 기존 코멘트 업데이트
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // 새 코멘트 작성
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body
              });
            }
