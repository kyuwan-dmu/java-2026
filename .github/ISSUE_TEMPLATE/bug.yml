name: "Bug Report"
description: "예상과 다르게 동작하는 버그를 제보합니다"
labels: ["bug", "triage"]
body:
  - type: input
    id: reporter
    attributes:
      label: Reporter
      placeholder: "20261234 홍길동"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: "버그의 심각도를 선택해주세요."
      options:
        - "Critical - 프로그램 실행 불가"
        - "Major - 주요 기능 동작 안 함"
        - "Minor - 일부 기능 이상"
        - "Low - 사소한 문제"
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: "관련 모듈(주차)을 선택해주세요."
      options:
        - week01
        - week02
        - week03
        - week04
        - week05
        - week06
        - week07
        - week08
        - week09
        - week10
        - week11
        - week12
        - week13
        - week14
        - week15
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "버그에 대해 간략히 설명해주세요."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "버그를 재현할 수 있는 단계를 적어주세요."
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "정상적으로 동작했다면 어떤 결과가 나와야 하나요?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "실제로 어떤 결과가 나왔나요?"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: "에러 로그가 있다면 전체를 붙여넣어주세요."
      render: shell
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "실행 환경을 적어주세요."
      placeholder: |
        - OS: Windows 11
        - JDK: 21
        - IDE: IntelliJ IDEA 2024.1
    validations:
      required: false
