name: "❓ 질문"
description: "수업 내용이나 과제에 대한 질문"
labels: ["question"]
body:
  - type: input
    id: student-info
    attributes:
      label: 학번 / 이름
      placeholder: "20261234 홍길동"
    validations:
      required: true
  - type: dropdown
    id: week
    attributes:
      label: 관련 주차
      options:
        - week01
        - week02
        - week03
        - week04
        - week05
        - week06
        - week07
        - week08
        - week09
        - week10
        - week11
        - week12
        - week13
        - week14
        - week15
        - 기타
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: 질문 내용
      description: "궁금한 점을 구체적으로 적어주세요."
      placeholder: "어떤 부분에서 어떤 에러가 발생하는지, 어떤 개념이 이해가 안 되는지 등"
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: 시도해본 것
      description: "문제 해결을 위해 시도해본 것이 있다면 적어주세요."
      placeholder: "검색해본 키워드, 시도한 코드 등"
    validations:
      required: false
